<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Buoni Logistica</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel per compilare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Regole CSS specifiche per la stampa */
        @media print {
            body {
                background-color: white;
            }

            .no-print {
                display: none !important;
            }

            .print-container {
                padding: 0;
                margin: 0;
            }

            .print-page {
                page-break-after: always;
            }

            .print-page:last-child {
                page-break-after: auto;
            }

            .voucher-page {
                page-break-inside: avoid;
                margin-bottom: 15mm !important;
                padding-top: 5mm;
                /* Margine superiore in stampa */
            }
        }

        /* Assicura che i bordi delle tabelle siano sempre neri e visibili */
        table.voucher-table,
        table.voucher-table th,
        table.voucher-table td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

    <!-- Qui React inietterà l'applicazione -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icone SVG Inline
        const ClipboardIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1" /><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><path d="M12 11h4" /><path d="M12 16h4" /><path d="M8 11h.01" /><path d="M8 16h.01" /></svg>;
        const FileTextIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" x2="8" y1="13" y2="13" /><line x1="16" x2="8" y1="17" y2="17" /><line x1="10" x2="8" y1="9" y2="9" /></svg>;
        const ArrowLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7" /><path d="M19 12H5" /></svg>;
        const PrinterIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect width="12" height="8" x="6" y="14" /></svg>;

        function Voucher({ data }) {
            // 11 righe vuote per la tabella (la prima conterrà la descrizione)
            const rows = Array.from({ length: 11 });

            return (
                <div className="voucher-page w-full max-w-[1000px] mx-auto bg-white mb-12 font-sans text-black">
                    <div className="border-[1.5px] border-black">

                        {/* HEADER */}
                        <div className="flex">
                            {/* Logo */}
                            <div className="w-[20%] border-r-[1.5px] border-b-[1.5px] border-black p-2 flex flex-col justify-center items-center relative overflow-hidden h-[80px]">
                                <img src="./Logo.jpg" alt="Logo" className="max-h-full max-w-full object-contain" />
                            </div>

                            {/* Destinazione */}
                            <div className="w-[60%] border-r-[1.5px] border-b-[1.5px] border-black p-2 flex flex-col justify-start">
                                <div className="text-[15px] mb-1">DESTINAZIONE:</div>
                                <div className="font-bold text-xl uppercase px-2">{data.destinazione}</div>
                            </div>

                            {/* Numero Ordine */}
                            <div className="w-[20%] flex flex-col">
                                <div className="border-b-[1.5px] border-black h-[30px] flex items-center justify-start px-2 text-[15px]">NR. ORD</div>
                                <div className="border-b-[1.5px] border-black flex-grow flex items-center justify-center font-bold text-xl uppercase">
                                    {data.nrOrd}
                                </div>
                            </div>
                        </div>

                        {/* TABELLA */}
                        <table className="w-full voucher-table border-none text-[15px]">
                            <thead>
                                <tr>
                                    <th className="font-normal w-[50%] p-1 h-[30px] align-bottom pb-1" rowSpan="2">DESCRIZIONE</th>
                                    <th className="font-normal w-[30%]" colSpan="2">QUANTITA'</th>
                                    <th className="font-normal w-[20%] align-bottom pb-1" rowSpan="2">NR. LOTTO</th>
                                </tr>
                                <tr>
                                    <th className="font-normal w-[15%] p-1 h-[25px] text-sm">NR. FILE</th>
                                    <th className="font-normal w-[15%] p-1 h-[25px] text-sm">PZ. PER FILA</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.map((_, index) => (
                                    <tr key={index}>
                                        <td className="h-[28px] px-2 uppercase font-medium">{index === 0 ? data.descrizione : ''}</td>
                                        <td className="h-[28px]"></td>
                                        <td className="h-[28px]"></td>
                                        <td className="h-[28px]"></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>

                        {/* FOOTER */}
                        <table className="w-full text-[15px]" style={{ borderCollapse: 'collapse' }}>
                            <tbody>
                                <tr>
                                    <td className="border-t-[1.5px] border-r-[1.5px] border-b-[1.5px] border-black w-[8%] p-1 text-center h-[35px]">NR. DDT</td>
                                    <td className="border-t-[1.5px] border-r-[1.5px] border-b-[1.5px] border-black w-[15%] p-1"></td>
                                    <td className="border-t-[1.5px] border-r-[1.5px] border-black w-[35%] p-1 text-center" style={{ borderBottom: 'none' }}>VETTORE</td>
                                    <td className="border-t-[1.5px] border-r-[1.5px] border-b-[1.5px] border-black w-[15%] p-1 text-center">CARRELLISTA</td>
                                    <td className="border-t-[1.5px] border-black w-[27%] p-2 text-[13px] align-bottom relative">
                                        <span className="absolute bottom-2">INIZIO CARICO........................</span>
                                    </td>
                                </tr>
                                <tr>
                                    <td className="border-r-[1.5px] border-black w-[8%] p-1 text-center h-[35px]">DATA</td>
                                    <td className="border-r-[1.5px] border-black w-[15%] p-1"></td>
                                    <td className="border-r-[1.5px] border-t-[1.5px] border-black w-[35%] p-1"></td>
                                    <td className="border-r-[1.5px] border-black w-[15%] p-1"></td>
                                    <td className="border-t-[1.5px] border-black w-[27%] p-2 text-[13px] align-bottom relative">
                                        <span className="absolute bottom-2">FINE CARICO........................</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
            const [inputText, setInputText] = useState('');
            const [parsedData, setParsedData] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);

            const handleGenerate = () => {
                if (!inputText.trim()) {
                    alert('Incolla i dati prima di generare i buoni.');
                    return;
                }

                const lines = inputText.split('\n').filter(line => line.trim() !== '');
                const generatedData = [];

                lines.forEach((line, index) => {
                    const columns = line.split('\t');

                    if (columns[0]?.toLowerCase().includes('data consegna') || columns[1]?.toLowerCase().includes('codice')) return;
                    
                    const nonEmptyCols = columns.filter(col => col.trim() !== '');
                    if (nonEmptyCols.length === 1 && nonEmptyCols[0].trim() === 'UDF+MARAZZI') return;

                    if (columns.length < 5) return;

                    let destinazione = columns[4]?.trim() || '';
                    if (destinazione === '' || destinazione === '-') destinazione = columns[6]?.trim() || '';

                    const nrOrd = columns[3]?.trim() || '';
                    const descrizione = columns[1]?.trim() || '';

                    generatedData.push({ id: index, destinazione, nrOrd, descrizione });
                });

                if (generatedData.length === 0) {
                    alert('Nessun dato valido trovato. Assicurati di aver incollato i dati in colonne.');
                    return;
                }

                setParsedData(generatedData);
                setIsGenerating(true);
            };

            return (
                <div>
                    {!isGenerating && (
                        <div className="max-w-5xl mx-auto p-6 no-print">
                            <div className="bg-white rounded-xl shadow-lg p-8">
                                <div className="flex items-center gap-3 mb-6 text-blue-600">
                                    <ClipboardIcon />
                                    <h1 className="text-2xl font-bold text-gray-800">Generatore Buoni Logistica</h1>
                                </div>

                                <p className="mb-4 text-gray-600">
                                    Incolla qui sotto le righe copiate dal tuo foglio Excel o gestionale.
                                    <br /><span className="font-mono text-xs bg-gray-100 p-1 rounded mt-2 inline-block">DATA CONSEGNA | Codice Articolo | Ragione Sociale Cliente | Numero Documento | Citta Destinatario | Ragione Sociale Destinatario | Citta Cliente | ...</span>
                                </p>

                                <textarea
                                    className="w-full h-64 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm whitespace-pre"
                                    placeholder="Incolla i dati qui..."
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                />

                                <div className="mt-6 flex justify-end">
                                    <button
                                        onClick={handleGenerate}
                                        className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow flex items-center gap-2 transition-colors"
                                    >
                                        <FileTextIcon />
                                        Genera Buoni
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isGenerating && (
                        <div className="w-full">
                            <div className="bg-white shadow p-4 sticky top-0 z-10 no-print flex justify-between items-center px-8 mb-8 border-b">
                                <button onClick={() => setIsGenerating(false)} className="text-gray-600 hover:text-gray-900 flex items-center gap-2 font-medium bg-gray-100 hover:bg-gray-200 py-2 px-4 rounded transition-colors">
                                    <ArrowLeftIcon /> Modifica Dati
                                </button>
                                <div className="text-center">
                                    <span className="font-bold text-lg">{parsedData.length}</span> buoni generati pronti per la stampa.
                                </div>
                                <button onClick={() => window.print()} className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow flex items-center gap-2 transition-colors">
                                    <PrinterIcon /> Stampa Tutti
                                </button>
                            </div>

                            <div className="print-container pb-12">
                                {Array.from({ length: Math.ceil(parsedData.length / 2) }).map((_, i) => (
                                    <div key={i} className="print-page">
                                        {parsedData.slice(i * 2, i * 2 + 2).map((data) => (
                                            <Voucher key={data.id} data={data} />
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
